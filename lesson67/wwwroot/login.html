<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录</title>
</head>
<body>
    <h2>登录</h2>
    <form action="/api/login" method="post">

    <p>还没有账号？ <a href="/register">立即注册</a></p>
</body>
</html>
