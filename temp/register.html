<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <style>
        .box {
            background: #f0f8ff;
            padding: 20px;
            width: 400px;
        }
        label {
            display: inline-block;
            width: 100px;
            font-size: 16px;
        }
        input {
            margin: 8px 0;
            padding: 4px;
            width: 200px;
        }
        .btn {
            width: 80px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>注册</h1>
    <div class="box">
        <label>用户名：</label><input type="text"><br>
        <label>邮箱地址：</label><input type="text"><br>
        <label>密码：</label><input type="password"><br>
        <label>确认密码：</label><input type="password"><br>
        <button class="btn">注册</button>
    </div>
</body>
</html>
