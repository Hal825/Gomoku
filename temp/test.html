<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        .box {
            background: #f0f8ff;
            padding: 20px;
            width: 400px;
        }
        label {
            display: inline-block;
            width: 80px;
            font-size: 16px;
        }
        input {
            margin: 8px 0;
            padding: 4px;
            width: 200px;
        }
        a {
            color: blue;
            text-decoration: underline;
        }
        .btn {
            width: 80px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>登录</h1>
    <div class="box">
        <label>用户名：</label><input type="text"><br>
        <label>密码：</label><input type="password"><br>
        <input type="checkbox">记住密码
        <a href="#" style="margin-left: 80px;">忘记密码</a><br>
        <button class="btn">登录</button><br>
        你还没有账号？点这里<a href="register.html">注册</a>
    </div>
</body>
</html>
